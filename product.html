<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Product Details | Creative Gallery Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
  <style>
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      margin: 0; 
    }
    input[type=number] {
      -moz-appearance: textfield;
      appearance: textfield;
    }
  </style>
</head>
<body>

  <div class="bg-fixed"></div>
  <div class="noise-overlay"></div>
  
  <div id="modal-preview"><img class="modal-content" id="modal-image" src="" alt="Preview"></div>

  <header>
    <div class="logo-container"><img class="logo" src="assets/Logos/Website logo.webp" alt="Logo"></div>
    <h1>Product Details</h1>
  </header>

  <nav aria-label="Main navigation">
    <a href="index.html">Home</a>
    <a href="frames.html">Frames</a>
    <a href="nameplates.html">Nameplates</a>
    <a href="gifts.html">Gifts</a>
    <a href="coasters.html">Coasters</a>
    <a href="wall-art.html">Wall Art</a>
    <a href="about.html">About</a>
    <div class="search-container">
      <input type="text" id="global-search" placeholder="Search..." autocomplete="off">
      <div id="search-results" class="search-results-dropdown"></div>
    </div>
  </nav>

  <main>
    <section class="animate" style="max-width: 1200px; margin: 0 auto; padding: 0 1.5rem;">
      
      <div style="margin-bottom: 2rem; display: flex;">
        <a href="javascript:history.back()" class="cute-back-btn">
          <span class="back-icon-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          </span>
          Back to Collection
        </a>
      </div>

      <div class="aesthetic-card product-container" style="display: flex; flex-wrap: wrap; gap: 3rem; padding: 2rem; align-items: flex-start; margin-top: 0;">
        
        <div class="visual-side" style="flex: 1 1 300px; width: 100%;">
          <div id="zoom-container" style="border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-lg); position: relative; cursor: crosshair; width: 100%; background: transparent; display: flex; justify-content: center; align-items: center;">
            <img id="prod-img" src="" alt="Product Image" style="width: 100%; max-height: 500px; object-fit: contain; display: block; transition: transform 0.1s ease-out; transform-origin: center center;">
          </div>
        </div>

        <div class="text-side" style="flex: 1 1 300px; text-align: left; width: 100%;">
          <span class="eyebrow" id="prod-id">SKU: </span>
          <h2 id="prod-title" style="font-size: 2.2rem; margin-bottom: 1rem; line-height: 1.2;"></h2>
          <p id="prod-price" style="font-size: 1.5rem; color: var(--accent); font-weight: 600; margin-bottom: 1rem;"></p>
          <p id="prod-desc" style="margin-bottom: 2rem; color: var(--text-light); line-height: 1.8;"></p>

          <div style="display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 2.5rem;">
            <div>
              <label style="font-weight: 600; display: block; margin-bottom: 0.5rem; font-family: var(--font-sans);">Size</label>
              <select id="prod-size" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.8); font-family: var(--font-sans); outline: none;"></select>
            </div>
            <div>
              <label style="font-weight: 600; display: block; margin-bottom: 0.5rem; font-family: var(--font-sans);">Customization</label>
              <select id="prod-cust" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.8); font-family: var(--font-sans); outline: none;"></select>
            </div>
            <div>
              <label style="font-weight: 600; display: block; margin-bottom: 0.5rem; font-family: var(--font-sans);">Special Notes</label>
              <textarea id="prod-notes" rows="3" placeholder="Any specific details?" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.8); font-family: var(--font-sans); outline: none; resize: vertical;"></textarea>
            </div>
            <div id="qty-wrapper" style="display: flex; align-items: center; gap: 0.5rem;">
              <label style="font-weight: 600; font-family: var(--font-sans); margin: 0; margin-right: 0.5rem;">Quantity:</label>
              <button id="qty-minus" style="width: 40px; height: 40px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1); background: white; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--text-main);">-</button>
              <input type="number" id="prod-qty" value="1" min="1" style="width: 60px; height: 40px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.8); font-family: var(--font-sans); outline: none; text-align: center; font-size: 1rem; font-weight: 600;">
              <button id="qty-plus" style="width: 40px; height: 40px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1); background: white; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--text-main);">+</button>
            </div>
            <p id="prod-total" style="font-size: 1.3rem; font-weight: 600; margin-top: 0.5rem; color: var(--text-main);"></p>
          </div>

          <button id="btn-add-cart" class="hero-btn" style="width: 100%; justify-content: center;">
            Add to Cart
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:8px;"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
          </button>
        </div>

      </div>
    </section>

    <section class="collections animate" style="margin-top: 5rem;">
      <h2 style="font-family: var(--font-serif); font-size: 2.2rem; text-align: center; margin-bottom: 3rem;">Recently Viewed</h2>
      <div id="recommendations-grid" class="gallery" style="padding: 0; max-width: 1400px; margin: 0 auto;">
      </div>
    </section>
  </main>

  <div class="footer-wrapper">
    <footer class="footer-pill">
      <div class="footer-content">
        <span class="footer-brand">Creative Gallery Store</span>
        <span class="footer-divider">✦</span>
        <span class="footer-text">Handmade with love</span>
      </div>
    </footer>
  </div>

  <script src="js/products-data.js"></script>
  <script src="js/product.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js" defer></script>

  <button id="backToTop" class="back-to-top-btn" aria-label="Scroll to top">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 15l-6-6-6 6"/></svg>
  </button>
</body>
</html>
